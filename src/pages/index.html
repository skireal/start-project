<!DOCTYPE html>
<html class="page no-js" lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <meta name="google" content="notranslate">
    <script>
        document.documentElement.classList.remove('no-js');
        if ('ontouchstart' in window) {
            document.documentElement.classList.add('touch');
        }
    </script>
    <link rel="icon" type="image/x-icon" href="img/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicons/apple-touch-icon.png">
    <link rel="manifest" href="img/favicons/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <title>Название сайта</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/vendors.js" defer></script>
    <script src="js/main.js" defer></script>
</head>

<body>
    <header class="page-header">
        <div class="page-header__wrapper">
            <a class="logo" href="/">
                <img src="img/logo.svg" alt="Логотип" width="100" height="30">
            </a>
            <nav class="main-nav" id="nav">
                <button
                    class="burger main-nav__toggler"
                    type="button"
                    aria-label="Открыть меню"
                    aria-expanded="false"
                    data-target-id="nav"
                    data-target-class-toggle="main-nav--open"
                ></button>
                <ul class="main-nav__list">
                    <li class="main-nav__item main-nav__item--active">
                        <a class="main-nav__link" href="/" aria-current="page">Главная</a>
                    </li>
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">О компании</a>
                    </li>
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">Услуги</a>
                    </li>
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">Контакты</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <h1>Заголовок страницы</h1>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <div class="page-footer__wrapper"></div>
    </footer>

</body>

</html>
